<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signage Performance Test - Schindler/PSP</title>
    
    <style>
        /* Base reset to optimize for Tizen embedded webview */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout structure mirroring the original page container grid */
        .signage-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }

        nav {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(15, 15, 15, 0.9);
            border-bottom: 1px solid #222;
            z-index: 10;
        }

        .nav-info {
            display: flex;
            flex-direction: column;
            text-align: right;
            font-size: 1.1rem;
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100% - 80px);
            position: relative;
        }

        .content-section {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 5;
            background: rgba(0, 0, 0, 0.4);
        }

        .profile-card {
            display: flex;
            align-items: center;
            gap: 30px;
            background: rgba(20, 20, 20, 0.85);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #333;
            max-width: 500px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-details {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .name { font-size: 1.6rem; font-weight: bold; }
        .title { color: #aaa; font-size: 1.1rem; }
        .contact { font-size: 1rem; color: #888; margin-top: 5px; }

        /* Media display section handling the hardware optimized visual wrapper */
        .visual-section {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Tizen hardware acceleration optimization layer */
        .optimized-media-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            /* Forces GPU rendering on Samsung signage SOCs */
            -webkit-transform: translate3d(0,0,0);
            transform: translate3d(0,0,0);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-perspective: 1000;
            perspective: 1000;
        }

        .optimized-media-container img, 
        .optimized-media-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .qr-box {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            display: inline-block;
            max-width: 200px;
            text-align: center;
        }
        
        .qr-box p { margin: 0 0 10px 0; font-size: 0.9rem; color: #ccc; }
    </style>
</head>
<body>

    <div class="signage-container">
        <nav>
            <div class="logo"><strong>PSP</strong> Swiss Property</div>
            <div class="nav-info">
                <time id="live-date">Freitag, 03.07.2026</time>
            </div>
        </nav>

        <main>
            <div class="content-section">
                <div class="profile-card">
                    <img class="profile-img" src="https://signage.web233.onlime.ch/img/MXwgPEBZDd/512x0_fit/fabian-laube-web.jpg?1778080511" alt="Fabian Laube">
                    <div class="profile-details">
                        <div class="name">Fabian Laube</div>
                        <div class="title">Leiter Bewirtschaftung</div>
                        <div class="contact">Tel. +41 44 625 57 23</div>
                        <div class="contact">fabian.laube@psp.info</div>
                    </div>
                </div>

                <div class="qr-box">
                    <p>Hier mehr:</p>
                    <div style="background: white; padding: 10px; border-radius: 4px;">
                        <div style="width: 130px; height: 130px; background: #222; margin: 0 auto; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem;">QR Code Area</div>
                    </div>
                </div>
            </div>

            <div class="visual-section">
                <div class="optimized-media-container">
                    
                    <img id="fallback-img" src="image_ec7ce3.jpg" alt="Logistics Elevator Standby View">
                    
                    <video 
                        id="signage-video"
                        autoplay 
                        muted 
                        loop 
                        playsinline 
                        webkit-playsinline 
                        preload="auto"
                        style="opacity: 0; transition: opacity 0.4s ease-in-out;">
                        <source src="https://player.vimeo.com/progressive_redirect/playback/765687745/rendition/720p/file.mp4%20%28720p%29.mp4?loc=external&oauth2_token_id=1053797514&signature=74f808a1b8dbc0b9f5e38f17a006502a58feeff1c6c4707a52b159351d11c062" type="video/mp4">
                    </video>

                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('signage-video');
            const fallbackImg = document.getElementById('fallback-img');

            // Play loop specifically configured for webkit signage platforms
            const initializePlayback = () => {
                video.play().then(() => {
                    // Smooth switch to video once engine verifies rendering has started
                    video.style.opacity = "1";
                    fallbackImg.style.opacity = "0";
                }).catch((err) => {
                    console.warn("Autoplay deferred by player policy, retrying loop sequence...", err);
                    setTimeout(() => {
                        video.muted = true;
                        video.play().then(() => {
                            video.style.opacity = "1";
                            fallbackImg.style.opacity = "0";
                        });
                    }, 500);
                });
            };

            initializePlayback();

            // Clock updates matching original layout behavior
            const updateClock = () => {
                const now = new Date();
                const options = { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' };
                document.getElementById('live-date').innerText = now.toLocaleDateString('de-CH', options);
            };
            setInterval(updateClock, 60000);
        });
    </script>
</body>
</html>
